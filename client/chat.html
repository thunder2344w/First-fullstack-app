<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="page-container chat-page">
        <header class="page-header chat-header">
            <div>
                <h1 id="chatFriendName">Chat</h1>
                <p id="chatFriendSubtitle">Send messages to your friend in real time.</p>
            </div>
            <button type="button" class="secondary-btn" onclick="redirectTo('index.html')">Back</button>
        </header>

        <section class="chat-card">
            <div id="chatBox" class="chat-box"></div>

            <form id="chatForm" class="chat-form">
                <input type="text" id="messageInput" placeholder="Type message..." autocomplete="off" />
                <button class="primary-btn" type="submit">Send</button>
            </form>

            <p id="message" class="status-message"></p>
        </section>
    </main>

    <script src="app.js?v=3"></script>
</body>

</html>
